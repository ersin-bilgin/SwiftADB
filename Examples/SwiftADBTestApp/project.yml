name: SwiftADBTestApp
options:
  bundleIdPrefix: com.swiftadb
  deploymentTarget:
    iOS: "16.0"
    macOS: "13.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  SwiftADB:
    path: ../..

settings:
  base:
    SWIFT_VERSION: "6.0"

targets:
  SwiftADBTestApp_iOS:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - README.md
          - project.yml
          - "*.xcodeproj"
          - Info-iOS.plist
    dependencies:
      - package: SwiftADB
        product: SwiftADB
      - package: SwiftADB
        product: SwiftADBiOSKit
    settings:
      base:
        PRODUCT_NAME: SwiftADBTestApp
        PRODUCT_BUNDLE_IDENTIFIER: com.swiftadb.testapp
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_STYLE: Automatic
    info:
      path: Info-iOS.plist
      properties:
        UILaunchScreen: {}
        NSLocalNetworkUsageDescription: "ADB cihazlarını keşfetmek ve bağlanmak için yerel ağ erişimi gerekir."
        NSBonjourServices:
          - _adb._tcp
          - _adb-tls-pairing._tcp

  SwiftADBTestApp_macOS:
    type: application
    platform: macOS
    sources:
      - path: .
        excludes:
          - README.md
          - project.yml
          - "*.xcodeproj"
          - Info-iOS.plist
    dependencies:
      - package: SwiftADB
        product: SwiftADB
      - package: SwiftADB
        product: SwiftADBiOSKit
    settings:
      base:
        PRODUCT_NAME: SwiftADBTestApp
        PRODUCT_BUNDLE_IDENTIFIER: com.swiftadb.testapp
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        COMBINE_HIDPI_IMAGES: YES

schemes:
  SwiftADBTestApp (iOS):
    build:
      targets:
        SwiftADBTestApp_iOS: all
    run:
      config: Debug
    archive:
      config: Release

  SwiftADBTestApp (macOS):
    build:
      targets:
        SwiftADBTestApp_macOS: all
    run:
      config: Debug
    archive:
      config: Release
