name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Swift build
        run: swift build -v

      - name: Swift test
        run: swift test -v

  lint-structure:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify package products
        run: swift package dump-package | grep -q SwiftADB
